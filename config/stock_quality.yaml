# ==============================================================================
# 股票品質評級配置檔
# ==============================================================================
# 本檔案定義股票品質評級標準，用於智慧組合篩選與風險警示。
# 評級基於回測 Sharpe Ratio，分為 A-F 五個等級。
# ==============================================================================

# ------------------------------------------------------------------------------
# 品質等級定義
# ------------------------------------------------------------------------------
quality_tiers:
  # A 級：核心持倉（Sharpe >= 1.0）
  # 適合作為投資組合核心配置，具備優異風險調整報酬
  A:
    min_sharpe: 1.0
    label: "核心持倉"
    color: "green"
    portfolio_eligible: true
    description: "優異的風險調整報酬，適合作為組合核心"
    
  # B 級：穩定配置（0.5 <= Sharpe < 1.0）
  # 穩定的投資標的，可納入組合分散風險
  B:
    min_sharpe: 0.5
    label: "穩定配置"
    color: "blue"
    portfolio_eligible: true
    description: "穩定的投資標的，適合組合配置"
    
  # C 級：觀察標的（0.0 <= Sharpe < 0.5）
  # 表現平平，建議觀察為主，不建議主動配置
  C:
    min_sharpe: 0.0
    label: "觀察標的"
    color: "yellow"
    portfolio_eligible: false
    description: "表現平平，建議觀察或小額配置"
    
  # D 級：謹慎操作（-0.5 <= Sharpe < 0.0）
  # 歷史表現欠佳，需謹慎評估，不建議納入組合
  D:
    min_sharpe: -0.5
    label: "謹慎操作"
    color: "orange"
    portfolio_eligible: false
    description: "歷史表現欠佳，需謹慎評估風險"
    
  # F 級：避免交易（Sharpe < -0.5）
  # 風險調整報酬極差，強烈不建議交易
  F:
    min_sharpe: -999.0  # 實際上是 < -0.5，這裡設定極小值作為下限
    label: "避免交易"
    color: "red"
    portfolio_eligible: false
    description: "風險調整報酬極差，強烈不建議交易"

# ------------------------------------------------------------------------------
# 預設優質股票池
# ------------------------------------------------------------------------------
# 這些股票經過驗證，通常為 A 或 B 級，可作為替代建議
default_quality_stocks:
  - symbol: "2330.TW"
    name: "台積電"
    category: "半導體"
    expected_rating: "A"
    
  - symbol: "2454.TW"
    name: "聯發科"
    category: "IC設計"
    expected_rating: "A"
    
  - symbol: "2317.TW"
    name: "鴻海"
    category: "電子製造"
    expected_rating: "B"
    
  - symbol: "0050.TW"
    name: "元大台灣50"
    category: "ETF"
    expected_rating: "B"
    
  - symbol: "2882.TW"
    name: "國泰金"
    category: "金融"
    expected_rating: "B"
    
  - symbol: "1301.TW"
    name: "台塑"
    category: "塑化"
    expected_rating: "B"

# ------------------------------------------------------------------------------
# 評級計算參數
# ------------------------------------------------------------------------------
rating_config:
  # 回測期間（年）
  backtest_years: 5
  
  # 是否使用波動率目標倉位
  use_vol_targeting: true
  
  # 最大替代建議數量
  max_alternatives: 3
  
  # 警告門檻（D 級或 F 級會顯示警告）
  warning_ratings: ["D", "F"]

# ------------------------------------------------------------------------------
# 組合建構參數
# ------------------------------------------------------------------------------
portfolio_construction:
  # 組合最大持股數
  max_positions: 8
  
  # 僅選擇此評級以上的股票（A, B）
  eligible_ratings: ["A", "B"]
  
  # A 級股票目標權重範圍
  tier_a_weight_range:
    min: 0.50  # 50%
    max: 0.70  # 70%
    
  # B 級股票目標權重範圍
  tier_b_weight_range:
    min: 0.30  # 30%
    max: 0.50  # 50%
