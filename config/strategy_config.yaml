# ==============================================================================
# MMBP 策略參數配置檔
# ==============================================================================
# 本檔案集中管理所有回測策略參數，便於版本控制與參數調整。
# 所有數值均經過實證測試，修改前請先進行 Walk-Forward 驗證。
# ==============================================================================

# ------------------------------------------------------------------------------
# 策略核心參數
# ------------------------------------------------------------------------------
strategy:
  # 模型機率門檻：pred == 1 且 proba_buy > threshold 時產生多單訊號
  model_threshold: 0.6
  
  # 基本面分數門檻：fund_score > threshold 時允許進場
  fund_score_threshold: 0.65
  
  # ATR 停損倍數：使用 N 倍 ATR 作為移動停損距離
  # 常見值：1.5（激進）、2.0（標準）、3.0（保守）
  atr_stop_multiplier: 2.0

# ------------------------------------------------------------------------------
# Regime 分類參數
# ------------------------------------------------------------------------------
regime:
  # ADX 趨勢強度門檻：ADX > threshold 才視為有趨勢
  # 調整說明：從 20.0 降至 15.0，放寬趨勢判定條件，增加進場機會
  # - ADX < 20: 弱趨勢或盤整
  # - ADX 20-25: 開始出現趨勢
  # - ADX > 25: 強趨勢
  adx_threshold: 15.0
  
  # ADX 計算週期（Wilder 平滑）
  adx_period: 14
  
  # 均線週期：用於判斷長期趨勢方向
  ma_period: 200
  
  # MA 斜率計算窗口：ma_200.diff(slope_window)
  slope_window: 5

# ------------------------------------------------------------------------------
# 波動率目標參數
# ------------------------------------------------------------------------------
volatility_targeting:
  # 預設目標年化波動率
  # 調整說明：從 10% (0.10) 提升至 18% (0.18)
  # 目的：提高資本效率，追求 8-12% 年化報酬目標
  default_target_annual: 0.18
  
  # 波動率估計回望期（交易日數）
  vol_lookback: 20
  
  # 最大槓桿倍數（單一資產倉位上限）
  max_leverage: 1.0
  
  # 波動率下限：避免極低波動時過度放大倉位
  min_vol_floor: 0.01

# ------------------------------------------------------------------------------
# 預期報酬與風險目標
# ------------------------------------------------------------------------------
performance_targets:
  # 預期年化報酬率範圍（調整後目標）
  expected_return_min: 0.08  # 8%
  expected_return_max: 0.12  # 12%
  
  # 最大回撤目標：期望策略 MDD 不超過此值
  max_drawdown_target: 0.10  # 10%

# ------------------------------------------------------------------------------
# 回測通用參數
# ------------------------------------------------------------------------------
backtest:
  # 無風險利率（用於 Sharpe Ratio 計算）
  risk_free_rate: 0.02  # 2%
  
  # 手續費率（單邊）
  # 台股現股：0.1425% 手續費 + 0.3% 證交稅 ≈ 0.4425%
  # 此處設定為 0.15% 是假設有折扣或使用較低成本管道
  fee_rate: 0.0015  # 0.15%

# ------------------------------------------------------------------------------
# 動量濾鏡參數
# ------------------------------------------------------------------------------
momentum_filter:
  # 是否預設啟用動量濾鏡（可在 API 呼叫時覆寫）
  enabled: false
  
  # 動量回望期（使用 return_N 欄位）
  lookback_days: 5
  
  # 動量門檻：return_N > threshold 才允許多單進場
  # 0.0 表示只要過去 N 日為正報酬即可
  threshold: 0.0

# ------------------------------------------------------------------------------
# 組合風險管理參數
# ------------------------------------------------------------------------------
portfolio:
  # 組合層級波動率目標（多資產組合）
  target_portfolio_vol_annual: 0.10
  
  # 單一資產權重上限（避免過度集中）
  max_single_weight: 0.40
  
  # 權重計算方式："inverse_vol"（逆波動率）或 "equal"（等權）
  weight_method: "inverse_vol"

# ------------------------------------------------------------------------------
# Walk-Forward 驗證參數
# ------------------------------------------------------------------------------
walk_forward:
  # 訓練期長度（年）
  train_years: 5
  
  # 測試期長度（年）
  test_years: 1
  
  # Sharpe 穩定性門檻：std(sharpe) 應 < threshold
  sharpe_std_threshold: 1.5
  
  # 負 Sharpe 窗口比例上限
  max_negative_sharpe_pct: 0.50  # 50%

# ------------------------------------------------------------------------------
# Monte Carlo 壓力測試參數
# ------------------------------------------------------------------------------
monte_carlo:
  # 模擬次數
  n_simulations: 1000
  
  # Block Bootstrap 區塊大小（保留時間序列相關性）
  block_size: 20
  
  # 隨機種子（設為 null 則每次隨機）
  seed: 42
  
  # MDD 警示門檻：超過此值發出警告
  mdd_warning_threshold: -0.15  # -15%

# ------------------------------------------------------------------------------
# 日誌與除錯
# ------------------------------------------------------------------------------
logging:
  # 是否記錄配置載入資訊
  log_config_load: true
  
  # 是否記錄每個 Walk-Forward 窗口結果
  log_walk_forward_windows: true
  
  # 是否記錄壓力測試詳細結果
  log_stress_test_details: false
